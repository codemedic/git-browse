<!DOCTYPE html>
<html>
<head>
  <script src="/_static/lucide.min.js"></script>
  <script src="/_static/icons.js"></script>
  <link rel="icon" type="image/svg+xml" href="/_static/assets/favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/svg+xml" href="/_static/assets/favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <script>window.__repoId = "{{repoId}}";</script>
  <link rel="stylesheet" href="/_static/style.css">
  
  <!-- Diff2Html -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html@3.4.56/bundles/css/diff2html.min.css">
  <script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.56/bundles/js/diff2html-ui-base.min.js"></script>
  
  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

  <script src="/_static/toolbar.js"></script>
  <script src="/_static/filetree.js"></script>
  <script src="/_static/offline-check.js"></script>
  <script src="/_static/git-state.js"></script>
  <script src="/_static/picture-theme.js"></script>
  <script src="/_static/command-palette.js"></script>
  <script src="/_static/agent-bridge.js"></script>
  
  <style>
    body.diff-view {
      margin-top: 48px;
      background-color: var(--bg-main);
    }
    
    #content.markdown-body {
      padding: 0;
      max-width: none;
      margin: 0;
    }

    .agent-review-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1.5rem;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 48px;
      z-index: 100;
      height: 48px;
      box-sizing: border-box;
    }
    
    .review-info {
      display: flex;
      align-items: center;
      min-width: 0;
      flex: 1;
    }

    .agent-badge {
      background: #0969da;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 12px;
      white-space: nowrap;
    }

    .file-path {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--fg-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .review-actions {
      display: flex;
      gap: 8px;
      margin-left: 16px;
    }

    .btn {
      padding: 5px 16px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .btn-approve {
      background: #238636;
      color: white;
      border-color: rgba(240,246,252,0.1);
    }
    .btn-approve:hover { background: #2ea043; }

    .btn-reject {
      background: #da3633;
      color: white;
      border-color: rgba(240,246,252,0.1);
    }
    .btn-reject:hover { background: #f85149; }

    .diff-wrapper-container {
      padding: 24px;
    }

    /* KILL WHITE LINES - Extremely aggressive reset */
    #content.markdown-body .d2h-wrapper table,
    #content.markdown-body .d2h-wrapper table tr,
    #content.markdown-body .d2h-wrapper table td {
      border: none !important;
      background-color: transparent !important;
      box-shadow: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    
    #content.markdown-body .d2h-wrapper table tr:hover {
      background-color: transparent !important;
    }

    /* Diff2Html Theme Overrides */
    .d2h-file-wrapper {
      margin-bottom: 0;
      border: 1px solid var(--border-color) !important;
      border-radius: 6px;
    }
    
    html[data-theme="dark"] .d2h-file-wrapper { background-color: #0d1117 !important; }
    html[data-theme="dark"] .d2h-file-header {
      background-color: #161b22 !important;
      border-bottom: 1px solid var(--border-color) !important;
      color: #c9d1d9 !important;
    }

    html[data-theme="dark"] .d2h-code-line-ctn { color: #c9d1d9 !important; }
    html[data-theme="dark"] .d2h-info { background-color: rgba(56,139,253,0.15) !important; color: #79c0ff !important; border: none !important; }
    
    html[data-theme="dark"] .d2h-del { background-color: rgba(248,81,73,0.15) !important; }
    html[data-theme="dark"] .d2h-ins { background-color: rgba(63,185,80,0.15) !important; }
    
    html[data-theme="dark"] .d2h-code-line-prefix { 
      color: inherit !important; 
      opacity: 0.7 !important;
      display: inline-block !important;
      width: 1.2em !important;
    }
    
    .d2h-code-line-ctn { 
      padding-left: 10px !important;
    }

    .hljs { background: transparent !important; padding: 0 !important; }
  </style>
</head>
<body class="diff-view">
  <div class="breadcrumbs" style="display:none">
    {{#each breadcrumbs}}<a href="{{href}}" {{#if isRoot}}class="breadcrumbs-root"{{/if}}>{{#if isRoot}}<i data-lucide="home"></i>{{else}}{{text}}{{/if}}</a>{{/each}}
  </div>

  <div id="content" class="markdown-body">
    <div class="agent-review-bar">
      <div class="review-info">
        <span class="agent-badge">{{agentName}}</span>
        <span class="file-path">{{filePath}}</span>
      </div>
      <div class="review-actions">
        <button class="btn btn-reject" id="btn-reject">Reject</button>
        <button class="btn btn-approve" id="btn-approve">Approve</button>
      </div>
    </div>

    <div class="diff-wrapper-container">
      <div id="diff-target"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const diffString = {{{diffContentJSON}}};
      const targetElement = document.getElementById('diff-target');
      
      if (!diffString) {
        targetElement.innerHTML = '<div class="flash flash-error">No diff content available.</div>';
        return;
      }

      const configuration = {
        drawFileList: false,
        matching: 'lines',
        outputFormat: 'line-by-line',
        highlight: true,
        renderNothingWhenEmpty: false,
      };
      
      try {
        const diff2htmlUi = new Diff2HtmlUI(targetElement, diffString, configuration, hljs);
        diff2htmlUi.draw();
        diff2htmlUi.highlightCode();
      } catch (err) {
        console.error('Failed to render diff:', err);
        targetElement.textContent = diffString;
      }

      const diffId = '{{diffId}}';
      
      document.getElementById('btn-approve').onclick = () => {
        if (window.__gitBrowseAgent) window.__gitBrowseAgent.approve(diffId);
      };
      
      document.getElementById('btn-reject').onclick = () => {
        if (window.__gitBrowseAgent) window.__gitBrowseAgent.reject(diffId);
      };
    });
  </script>
</body>
</html>
