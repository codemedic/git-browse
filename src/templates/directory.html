<!DOCTYPE html>
<html>
<head>
  <script src="__ASSETS__lucide.min.js"></script>
  <script src="__ASSETS__icons.js"></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="__ASSETS__style.css">
  <script src="__ASSETS__toolbar.js"></script>
  <script src="__ASSETS__filetree.js"></script>
  <script src="__ASSETS__offline-check.js"></script>
  <script src="__ASSETS__git-state.js"></script>
  <script src="__ASSETS__picture-theme.js"></script>
  <script src="__ASSETS__command-palette.js"></script>
  <script src="__ASSETS__change-tracker.js"></script>
  <script src="__ASSETS__breadcrumb-actions.js"></script>
</head>
<body class="directory-view">
  <div class="breadcrumbs">
    {{#each breadcrumbs}}<a href="{{href}}" {{#if isRoot}}class="breadcrumbs-root"{{/if}}>{{#if isRoot}}<i data-lucide="home"></i>{{else}}{{text}}{{/if}}</a>{{/each}}
    <button id="breadcrumbs-copy-btn" title="Copy path to clipboard"><i data-lucide="copy"></i></button>
  </div>
  <div id="content" class="markdown-body">
    {{{content}}}
  </div>
  <div class="footer">
    <span class="footer-text">git-browse</span>
  </div>
</body>
</html>
