<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error {{code}}</title>
  <link rel="stylesheet" href="__ASSETS__style.css">
</head>
<body class="error-view">
  <h1>Error {{code}}</h1>
  <p>File: {{fileName}}</p>
  <p>Path: {{filePath}}</p>
  <pre>{{errorMsg}}</pre>
  <pre>{{errorStack}}</pre>
  <p><a href="{{referer}}">Go back</a></p>
</body>
</html>
